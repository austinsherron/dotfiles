
## prompt ######################################################################

format = """
$kubernetes$terraform$line_break\
($git_branch$git_status$git_metrics$git_state$line_break)\
$battery $time $directory$lua$python$golang$java$nodejs \
$cmd_duration\
$sudo\
$line_break\
$character"""

## core ########################################################################

[character] # -> the actual prompt
success_symbol = "[❯](blue)"
error_symbol = "[❯](red)"
vimcmd_symbol = "[❮](green)"

[cmd_duration] # -> displays slow cmd warnings
min_time = 100
style = "dimmed white"
disabled = true

[directory] # -> mini path/repo base
truncate_to_repo = true
truncation_length = 2
style = "cyan"
repo_root_style = "bold purple"
home_symbol = "~"

[sudo] # -> only visible if sudo creds are cached
disabled = false

## informational ###############################################################

[battery] # -> gives us info about battery state
disabled = false
format = "[$symbol]($style)"

[[battery.display]]
threshold = 100
style = "bold green"
charging_symbol = "󰂅"
discharging_symbol = "󰁹"

[[battery.display]]
threshold = 90
style = "green"
charging_symbol = "󰂋"
discharging_symbol = "󰂂"

[[battery.display]]
threshold = 80
style = "light green"
charging_symbol = "󰂊"
discharging_symbol = "󰂁"

[[battery.display]]
threshold = 70
style = "light green"
charging_symbol = "󰢞"
discharging_symbol = "󰂀"

[[battery.display]]
threshold = 60
style = "light yellow"
charging_symbol = "󰂉"
discharging_symbol = "󰁿"

[[battery.display]]
threshold = 50
style = "yellow"
charging_symbol = "󰢝"
discharging_symbol = "󰁾"

[[battery.display]]
threshold = 40
style = "bold yellow"
charging_symbol = "󰂈"
discharging_symbol = "󰁽"

[[battery.display]]
threshold = 30
style = "light red"
charging_symbol = "󰂇"
discharging_symbol = "󰁼"

[[battery.display]]
threshold = 20
style = "red"
charging_symbol = "󰂆"
discharging_symbol = "󰁻"

[[battery.display]]
threshold = 10
style = "bold red"
charging_symbol = "󰢜"
discharging_symbol = "󰁺"

[[battery.display]]
threshold = 5
style = "bold red"
charging_symbol = "󰢟"
discharging_symbol = "󰂎"

[[battery.display]]
threshold = 2
style = "bold red"
charging_symbol = "󰚌"
discharging_symbol = "󰯈"

[time]
format = "[$time]($style)"
time_format = "%I:%M"
disabled = false
style = "bold green"
use_12hr = true

## git #########################################################################

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold cyan"

[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = "[$added]($added_style) [$deleted]($deleted_style)"

[git_status]
format = "([$conflicted$modified$staged$ahead_behind]($style))"
style = "yellow"
conflicted = " "
modified = " "
staged = " "
untracked = " "

## languages ###################################################################

[golang]
version_format = "v${major}.${minor}"
format = "[$symbol($version )]($style)"

[java]
symbol = "☕ "
version_format = "v${major}.${minor}"
format = "[$symbol($version )]($style)"

[lua]
symbol = "🌙 "
version_format = "v${major}.${minor}"
format = "[$symbol($version )]($style)"

[python]
symbol = "🐍 "
version_format = "v${major}.${minor}"
format = "[$symbol($version )($virtualenv)]($style)"

## cloud #######################################################################

# TODO: add aws and gcp modules

## kubernetes ##################################################################

[kubernetes]
symbol = "⎈"
disabled = false
format = '[$symbol $context( \($namespace\))]($style) '
style = "#FFA500"
detect_folders = [
    "chart",
    "charts",
    "cluster",
    "clusters",
    "eks",
    "gke",
    "helm",
    "k8s",
    "kubernetes",
]
detect_files = [
    "Chart.yaml",
    "Chart.yml",
    "helmfile.yaml",
    "helmfile.yml",
    "values.yaml",
    "values.yml",
]

[[kubernetes.contexts]]
context_pattern = "tellus.*-gcp"
context_alias = "gcp-tellus"

[[kubernetes.contexts]]
context_pattern = "tellus.*-aws"
context_alias = "aws-tellus"

## infra #######################################################################

# TODO: add docker module

[terraform]
format = '[$symbol$workspace( \($version\))]($style) '
style = "#e074e0"
